# NOTE: Day-to-day CI (push / PR) is handled by ci.yml.
# This workflow exists for on-demand/manual builds only.

name: Build (manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew clean buildPlugin --no-daemon
