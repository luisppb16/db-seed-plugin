# Release pipeline — triggered only when a GitHub Release is published.
# Required repository secrets:
#   CERTIFICATE_CHAIN      — PEM certificate chain for plugin signing
#   PRIVATE_KEY            — PEM private key for plugin signing
#   PRIVATE_KEY_PASSWORD   — Password for the private key
#   PUBLISH_TOKEN          — JetBrains Marketplace publish token

name: Build, Test, Sign, Release and Publish Plugin

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  release:
    name: Sign, Package & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests and generate JaCoCo report
        run: ./gradlew clean test jacocoTestReport --no-daemon
        env:
          GRADLE_OPTS: >-
            -Dcom.mysql.cj.disableAbandonedConnectionCleanup=true
            -Dpgjdbc.config.cleanup.thread.ttl=1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      # ── Verify ────────────────────────────────────────────────────────────
      - name: Verify plugin against recommended IDEs
        run: ./gradlew verifyPlugin --no-daemon

      # ── Sign ──────────────────────────────────────────────────────────────
      - name: Sign plugin
        run: ./gradlew signPlugin --no-daemon
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      # ── Locate the signed ZIP ─────────────────────────────────────────────
      - name: Locate distributable ZIP
        id: locate-zip
        run: |
          ZIP_PATH=$(find build/distributions -type f -name "*-signed.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            ZIP_PATH=$(find build/distributions -type f -name "*.zip" | head -n 1)
          fi
          if [ -z "$ZIP_PATH" ]; then
            echo "No distributable ZIP file found" >&2
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      # ── Attach ZIP to GitHub Release ──────────────────────────────────────
      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate-zip.outputs.zip_path }}

      # ── Publish to JetBrains Marketplace ─────────────────────────────────
      - name: Publish plugin to JetBrains Marketplace
        run: ./gradlew publishPlugin --no-daemon
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

