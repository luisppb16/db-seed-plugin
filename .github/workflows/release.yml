name: Build, Test, Sign, Release and Publish Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.4.0'

      - name: Run Gradle build, tests, and JaCoCo report
        run: gradle clean buildPlugin jacocoTestReport

      - name: Build plugin distribution ZIP
        if: github.event_name == 'release'
        run: gradle clean buildPlugin

      - name: Sign plugin distribution ZIP
        if: github.event_name == 'release'
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: gradle signPlugin

      - name: Locate plugin ZIP
        if: github.event_name == 'release'
        id: locate-zip
        run: |
          ZIP_PATH=$(find build/distributions -type f -name "*-signed.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            ZIP_PATH=$(find build/distributions -type f -name "*.zip" | head -n 1)
          fi
          if [ -z "$ZIP_PATH" ]; then
            echo "No distributable ZIP file found" >&2
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate-zip.outputs.zip_path }}

      - name: Publish plugin to JetBrains Marketplace
        if: github.event_name == 'release'
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: gradle publishPlugin